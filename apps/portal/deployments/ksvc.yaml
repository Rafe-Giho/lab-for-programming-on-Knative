apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: portal
  namespace: study
spec:
  template:
    spec:
      containerConcurrency: 10
      timeoutSeconds: 30
      serviceAccountName: portal
      containers:
        - image: shinkiho/python-runner-portal:0.1.1
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: portal-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
